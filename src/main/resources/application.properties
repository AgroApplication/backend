# ===========================
# AgroVision AI Backend Config
# ===========================

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/agrovision
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=AgroVisionAI2026SecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Python Model Service
app.model.service-url=http://localhost:5000/predict
app.model.fallback-enabled=true

# CORS
app.cors.allowed-origins=http://localhost:3000
